services:
  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hms
      MYSQL_USER: hms
      MYSQL_PASSWORD: hms
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hms
      DB_USERNAME: hms
      DB_PASSWORD: hms
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/var/www/html

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  redis_data:
